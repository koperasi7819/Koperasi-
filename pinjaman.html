<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Pinjaman</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
scroll-behavior:smooth;
}

header{
background:linear-gradient(to right,#1e90ff,#0f3057);
color:white;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{padding:10px;}

.card{
font-size:14px;
background:white;
padding:12px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#1e90ff;
color:white;
}

.icon-btn{
border:none;
background:none;
cursor:pointer;
font-size:20px;
margin:0 3px;
}

.icon-edit{color:#ffc107;}
.icon-delete{color:#dc3545;}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:10px;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
max-width:90%;
max-height:90vh;
overflow-y:auto;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand img{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
}

.brand-text .subtitle{
font-size:12px;
opacity:0.9;
}

.brand-text .title{
font-size:14px;
font-weight:bold;
}

h3{text-align:center}

.total{
font-weight:bold;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>

<div class="brand">
<img src="img/icon-192.png">
<div class="brand-text">
<div class="subtitle">Koperasi</div>
<div class="title">ARFA DRIVER</div>
</div>
</div>

<div>👥 Data Peminjam</div>

<button onclick="kembali()">Kembali</button>

</header>

<div class="container">

<div class="card">
<div class="total">
Total Pinjaman : Rp <span id="totalPinjaman">0</span>
</div>
</div>

<div class="card" id="formPinjaman">

<h3>Tambah Pinjaman</h3>

<label>Anggota</label>
<select id="anggota"></select>

<label>No Pinjaman</label>
<input type="text" id="noPinjaman" readonly>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Metode</label>
<select id="metode">
<option value="cash">Cash</option>
<option value="bank">Bank</option>
</select>

<label>Jumlah</label>
<input type="number" id="jumlah" min="1">

<label>Keterangan</label>
<input type="text" id="ket">

<button onclick="simpanPinjaman()">Simpan</button>

</div>

<div class="card">

<h3>Daftar Pinjaman</h3>

<div id="tabelPinjaman"></div>

</div>

</div>

<div id="popupEdit" class="popup">

<div class="popup-box">

<h3>Edit Pinjaman</h3>

<label>No Pinjaman</label>
<input type="text" id="editNoPinjaman" readonly>

<label>Anggota</label>
<select id="editAnggota"></select>

<label>Tanggal</label>
<input type="date" id="editTanggal">

<label>Metode</label>
<select id="editMetode">
<option value="cash">Cash</option>
<option value="bank">Bank</option>
</select>

<label>Jumlah</label>
<input type="number" id="editJumlah" readonly>

<label>Keterangan</label>
<input type="text" id="editKet">

<br><br>

<button onclick="updatePinjaman()">Update</button>
<button onclick="tutupPopup()">Batal</button>

</div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
authDomain:"arfa-c7dee.firebaseapp.com",
databaseURL:"https://arfa-c7dee-default-rtdb.firebaseio.com",
projectId:"arfa-c7dee"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

if(!localStorage.getItem("role")){
alert("Silakan login dulu")
window.location.href="index.html"
}

const role=localStorage.getItem("role") || "user"

const anggotaRef=db.ref("koperasi/anggota")
const pinjamanRef=db.ref("koperasi/pinjaman")

let dataPinjaman={}
let editId=null

const anggotaSelect=document.getElementById("anggota")
const editAnggota=document.getElementById("editAnggota")
const tabel=document.getElementById("tabelPinjaman")
const totalPinjaman=document.getElementById("totalPinjaman")

function generateNoPinjaman(){

pinjamanRef.once("value",snap=>{

let max=0

snap.forEach(d=>{

let p=d.val()

if(p.nomor){

let num=parseInt(p.nomor.replace("PJ",""))

if(num>max) max=num

}

})

let nomor="PJ"+String(max+1).padStart(3,"0")

document.getElementById("noPinjaman").value=nomor

})

}

generateNoPinjaman()

anggotaRef.on("value",snap=>{

anggotaSelect.innerHTML="<option value=''>Pilih anggota</option>"
editAnggota.innerHTML="<option value=''>Pilih anggota</option>"

snap.forEach(d=>{

let a=d.val()

let opt=`<option value="${d.key}">${a.nama}</option>`

anggotaSelect.innerHTML+=opt
editAnggota.innerHTML+=opt

})

})

pinjamanRef.on("value",snap=>{

tabel.innerHTML=""
dataPinjaman={}

let total=0

snap.forEach(d=>{

let p=d.val()
let id=d.key

dataPinjaman[id]=p

let jumlah=Number(p.jumlah||0)

total+=jumlah

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div style="display:flex;justify-content:space-between">

<div><b>${p.nomor}</b></div>

<div>${p.metode}</div>

</div>

<div>Anggota : ${p.nama}</div>
<div>Tanggal : ${p.tanggal}</div>
<div>Pinjaman : Rp ${format(jumlah)}</div>
<div>Keterangan : ${p.ket || "-"}</div>

<div style="text-align:right">

${role==="admin" ? `

<button class="icon-btn icon-edit" onclick="editPinjaman('${id}')">
<span class="material-icons">edit</span>
</button>

<button class="icon-btn icon-delete" onclick="hapusPinjaman('${id}')">
<span class="material-icons">delete</span>
</button>

` : ``}

</div>
`

tabel.appendChild(card)

})

totalPinjaman.innerText=format(total)

})

function format(x){
return new Intl.NumberFormat("id-ID").format(x)
}

function simpanPinjaman(){

if(role!=="admin"){
alert("Hanya admin yang bisa menambah pinjaman")
return
}

let nomor=document.getElementById("noPinjaman").value
let idAnggota=anggotaSelect.value
let nama=anggotaSelect.options[anggotaSelect.selectedIndex].text
let tanggal=document.getElementById("tanggal").value
let jumlah=parseInt(document.getElementById("jumlah").value)
let metode=document.getElementById("metode").value
let ket=document.getElementById("ket").value

if(!idAnggota || !tanggal || !jumlah){
alert("Isi semua field")
return
}

let newRef=pinjamanRef.push()
let kasRef=db.ref("koperasi/kas").push()

kasRef.set({
tanggal:new Date(tanggal).getTime(),
keterangan:"Pinjaman "+nama,
tipe:"keluar",
sumberKas:metode,
jumlah
})

newRef.set({
nomor,
idAnggota,
nama,
tanggal,
jumlah,
metode,
ket,
kasId:kasRef.key
})

.then(()=>{

alert("Pinjaman tersimpan & kas berkurang")

document.getElementById("jumlah").value=""
document.getElementById("ket").value=""
anggotaSelect.selectedIndex=0

generateNoPinjaman()

})

}

function editPinjaman(id){

if(role!=="admin") return

let p=dataPinjaman[id]

editId=id

document.getElementById("editNoPinjaman").value=p.nomor
document.getElementById("editTanggal").value=p.tanggal
document.getElementById("editMetode").value=p.metode
document.getElementById("editJumlah").value=p.jumlah
document.getElementById("editKet").value=p.ket || ""

setTimeout(()=>{
editAnggota.value=p.idAnggota
},200)

document.getElementById("popupEdit").style.display="flex"

}

function updatePinjaman(){

let idAnggota=document.getElementById("editAnggota").value
let nama=editAnggota.options[editAnggota.selectedIndex].text
let tanggal=document.getElementById("editTanggal").value
let metode=document.getElementById("editMetode").value
let nomor=document.getElementById("editNoPinjaman").value
let ket=document.getElementById("editKet").value

db.ref("koperasi/pinjaman/"+editId).update({
nomor,
idAnggota,
nama,
tanggal,
metode,
ket
})

.then(()=>{

alert("Data pinjaman berhasil diupdate")

tutupPopup()

})

}

function hapusPinjaman(id){

if(!confirm("Hapus pinjaman ini?")) return

let p=dataPinjaman[id]

db.ref("koperasi/pinjaman/"+id).remove()

if(p.kasId){
db.ref("koperasi/kas/"+p.kasId).remove()
}

}

function tutupPopup(){
document.getElementById("popupEdit").style.display="none"
}

function kembali(){
window.location="dashboard.html"
}

if(role!=="admin"){
document.getElementById("formPinjaman").style.display="none"
}

document.getElementById("tanggal").valueAsDate=new Date()

</script>

</body>
</html>
