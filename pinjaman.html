<!DOCTYPE html>  <html lang="id">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Data Pinjaman</title>  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>  <style>  
  
body{  
font-family:Arial;  
margin:0;  
background:#f4f6f9;  
}  
  
header{  
background:linear-gradient(to right,#1e90ff,#0f3057);  
color:white;  
padding:14px;  
display:flex;  
justify-content:space-between;  
align-items:center;  
}  
  
.container{padding:10px;}  
  
.card{  
background:white;  
padding:12px;  
border-radius:10px;  
margin-bottom:10px;  
box-shadow:0 2px 5px rgba(0,0,0,0.1);  
}  
  
input,select{  
width:100%;  
padding:8px;  
margin-top:5px;  
margin-bottom:10px;  
border:1px solid #ccc;  
border-radius:6px;  
}  
  
button{  
padding:8px 12px;  
border:none;  
border-radius:6px;  
cursor:pointer;  
background:#1e90ff;  
color:white;  
}  
  
.icon-btn{  
border:none;  
background:none;  
cursor:pointer;  
font-size:20px;  
}  
  
.icon-edit{color:#ffc107;}  
.icon-delete{color:#dc3545;}  
  
.popup{  
position:fixed;  
top:0;  
left:0;  
width:100%;  
height:100%;  
background:rgba(0,0,0,0.5);  
display:none;  
justify-content:center;  
align-items:center;  
}  
  
.popup-box{  
background:white;  
padding:20px;  
border-radius:10px;  
width:300px;  
}  
  
.total{  
font-weight:bold;  
margin-bottom:10px;  
}  
  
</style>  </head>  <body>  <header>  
<div>Data Pinjaman</div>  
<button onclick="window.location='dashboard.html'">Kembali</button>  
</header>  <div class="container">  <div class="card">  
<div class="total">Total Pinjaman : Rp <span id="totalPinjaman">0</span></div>  
</div>  <div class="card" id="formPinjaman">  <h3>Tambah Pinjaman</h3>  <label>Anggota</label>
<select id="anggota"></select>

<label>No Pinjaman</label>
<input type="text" id="noPinjaman" readonly>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Metode</label>
<select id="metode">

<option value="cash">Cash</option>  
<option value="bank">Bank</option>  
</select>  <label>Jumlah</label>
<input type="number" id="jumlah">

<label>Keterangan</label>
<input type="text" id="ket">

<button onclick="simpanPinjaman()">Simpan</button>

</div>  <div class="card">  <h3>Daftar Pinjaman</h3>  <div id="tabelPinjaman"></div>  </div>  </div>  <div id="popupEdit" class="popup">  <div class="popup-box">  <h3>Edit Pinjaman</h3>  <label>No Pinjaman</label>
<input type="text" id="editNoPinjaman" readonly>

<label>Anggota</label>
<select id="editAnggota"></select>

<label>Tanggal</label>
<input type="date" id="editTanggal">

<label>Metode</label>
<select id="editMetode">

<option value="cash">Cash</option>  
<option value="bank">Bank</option>  
</select>  <label>Jumlah</label>
<input type="number" id="editJumlah" readonly>

<label>Keterangan</label>
<input type="text" id="editKet">

<button onclick="updatePinjaman()">Update</button>
<button onclick="tutupPopup()">Batal</button>

</div>  
</div>  <script>  
  /* Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
  authDomain: "arfa-c7dee.firebaseapp.com",
  databaseURL: "https://arfa-c7dee-default-rtdb.firebaseio.com",
  projectId: "arfa-c7dee",
  storageBucket: "arfa-c7dee.firebasestorage.app",
  messagingSenderId: "468058520812",
  appId: "1:468058520812:web:f9cbc82fe7e88ecda9b9c9"
};

  
firebase.initializeApp(firebaseConfig)  
const db=firebase.database()  
  
const anggotaRef=db.ref("koperasi/anggota")  
const pinjamanRef=db.ref("koperasi/pinjaman")  
  
let dataPinjaman={}  
let editId=null  
  
const anggota=document.getElementById("anggota")  
const editAnggota=document.getElementById("editAnggota")  
const tabel=document.getElementById("tabelPinjaman")  
const totalPinjaman=document.getElementById("totalPinjaman")  
  
function generateNoPinjaman(){  
  
pinjamanRef.once("value",snap=>{  
  
let max=0  
  
snap.forEach(d=>{  
let p=d.val()  
  
if(p.nomor){  
let num=parseInt(p.nomor.replace("PJ",""))  
if(num>max)max=num  
}  
  
})  
  
let nomor="PJ"+String(max+1).padStart(3,"0")  
  
document.getElementById("noPinjaman").value=nomor  
  
})  
  
}  
  
generateNoPinjaman()  
  
anggotaRef.on("value",snap=>{  
  
anggota.innerHTML=""  
editAnggota.innerHTML=""  
  
snap.forEach(d=>{  
  
let a=d.val()  
  
anggota.innerHTML+=`<option value="${d.key}">${a.nama}</option>`  
editAnggota.innerHTML+=`<option value="${d.key}">${a.nama}</option>`  
  
})  
  
})  
  
pinjamanRef.on("value",snap=>{  
  
tabel.innerHTML=""  
dataPinjaman={}  
  
let total=0  
  
snap.forEach(d=>{  
  
let p=d.val()  
let id=d.key  
  
dataPinjaman[id]=p  
  
total+=Number(p.jumlah)  
  
let card=document.createElement("div")  
card.className="card"  
  
card.innerHTML=`  
  
<b>${p.nomor}</b><br>  
Anggota : ${p.nama}<br>  
Tanggal : ${formatTanggal(p.tanggal)}<br>  
Jumlah : Rp ${format(p.jumlah)}<br>  
Keterangan : ${p.ket || "-"}  
  
<br><br>  
  
<button class="icon-btn icon-edit" onclick="editPinjaman('${id}')">  
<span class="material-icons">edit</span>  
</button>  
  
<button class="icon-btn icon-delete" onclick="hapusPinjaman('${id}')">  
<span class="material-icons">delete</span>  
</button>  
  
`  
  
tabel.appendChild(card)  
  
})  
  
totalPinjaman.innerText=format(total)  
  
})  
  
function format(x){  
return new Intl.NumberFormat("id-ID").format(x)  
}  
  
function formatTanggal(t){
  if(!t) return "-"
  
  let d = new Date(Number(t))

  return d.toLocaleString("id-ID", {
    day: "2-digit",
    month: "long",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  })
}
  
function simpanPinjaman(){  
  
let idAnggota=anggota.value  
let nama=anggota.options[anggota.selectedIndex].text  
let nomor=document.getElementById("noPinjaman").value  
let tglInput = document.getElementById("tanggal").value
let now = new Date()

let tanggal = new Date(tglInput)
tanggal.setHours(now.getHours())
tanggal.setMinutes(now.getMinutes())

tanggal = tanggal.getTime() // simpan dalam timestamp  
let jumlah=document.getElementById("jumlah").value  
let metode=document.getElementById("metode").value  
let ket=document.getElementById("ket").value  
  
if(!tanggal||!jumlah)return alert("Isi data dulu")  
  
pinjamanRef.push().set({  
idAnggota,  
nama,  
nomor,  
tanggal,  
jumlah,  
metode,  
ket  
})  
  
.then(()=>{  
  
alert("Pinjaman tersimpan")  
  
document.getElementById("jumlah").value=""  
document.getElementById("ket").value=""  
  
generateNoPinjaman()  
  
})  
  
}  
  
function editPinjaman(id){

  if(!id) return alert("ID tidak ditemukan")

  let p=dataPinjaman[id]

  if(!p) return alert("Data tidak ditemukan")

  editId=id

  document.getElementById("editNoPinjaman").value=p.nomor
  if(p.tanggal){
  let d = new Date(Number(p.tanggal))
  document.getElementById("editTanggal").value = d.toISOString().split("T")[0]
}
  document.getElementById("editMetode").value=p.metode
  document.getElementById("editJumlah").value=p.jumlah
  document.getElementById("editKet").value=p.ket||""

  editAnggota.value=p.idAnggota

  document.getElementById("popupEdit").style.display="flex"
}
  
function updatePinjaman(){

  if(!editId) return alert("ID edit tidak ada")

  let idAnggota=editAnggota.value
  let nama=editAnggota.options[editAnggota.selectedIndex].text
  let tglInput = document.getElementById("editTanggal").value
let now = new Date()

let tanggal = new Date(tglInput)
tanggal.setHours(now.getHours())
tanggal.setMinutes(now.getMinutes())

tanggal = tanggal.getTime()
  let metode=document.getElementById("editMetode").value
  let nomor=document.getElementById("editNoPinjaman").value
  let ket=document.getElementById("editKet").value

  if(!tanggal) return alert("Tanggal kosong")

  pinjamanRef.child(editId).update({
    idAnggota,
    nama,
    tanggal,
    metode,
    nomor,
    ket
  })
  .then(()=>{
    alert("Data berhasil diupdate")
    tutupPopup()

    editId = null   // ✅ TARUH DI SINI
  })
  .catch(err=>{
    console.error(err)
    alert("Gagal update: "+err.message)
  })

}
  
function hapusPinjaman(id){  
  
if(!confirm("Hapus pinjaman?"))return  
  
pinjamanRef.child(id).remove()  
  
}  
  
function tutupPopup(){  
document.getElementById("popupEdit").style.display="none"  
}  
  
document.getElementById("tanggal").valueAsDate=new Date()  
  
</script>  </body>  
</html>
